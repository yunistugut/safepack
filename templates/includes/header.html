{% load static %}
<header role="banner">
  <a href="{% url 'core:home' %}" class="logo-wrap" aria-label="{{ SITE_NAME }} Anasayfa">
    {% comment %}
    Gerçek logo görseli:
    <img src="{% static 'img/safepackisg-logo.png' %}"
         alt="SafePackISG - İş Güvenliği ve Ambalaj Malzemeleri"
         class="logo-img" width="160" height="60">
    {% endcomment %}
    <div>
      <div class="logo-text"><span class="blue">SafePack</span><span class="orange">ISG</span></div>
      <span class="logo-sub">İş Güvenliği ve Ambalaj Malzemeleri</span>
    </div>
  </a>

  <nav role="navigation" aria-label="Ana navigasyon">
    <a href="{% url 'core:home' %}" class="nav-link {% if request.resolver_match.url_name == 'home' %}active{% endif %}">Anasayfa</a>

    <div class="nav-dropdown">
      <a href="{% url 'products:list' %}" class="nav-link {% if 'products' in request.resolver_match.namespace %}active{% endif %}" aria-haspopup="true">
        Ürünler ▾
      </a>
      <div class="nav-dropdown-menu" role="menu">
        {% for cat in nav_categories %}
        <a href="{{ cat.get_absolute_url }}" role="menuitem">
          {{ cat.icon }} {{ cat.name }}
        </a>
        {% endfor %}
      </div>
    </div>

    <a href="{% url 'core:certificates' %}" class="nav-link {% if request.resolver_match.url_name == 'certificates' %}active{% endif %}">Sertifikalar</a>
    <a href="{% url 'blog:list' %}" class="nav-link {% if 'blog' in request.resolver_match.namespace %}active{% endif %}">Blog</a>
    <a href="{% url 'contact:contact' %}" class="nav-link {% if 'contact' in request.resolver_match.namespace %}active{% endif %}">İletişim</a>
    <a href="{% url 'contact:contact' %}" class="btn-cta" aria-label="Fiyat teklifi isteyin">📞 Teklif Al</a>
  </nav>

  <button class="hamburger" aria-label="Menüyü aç" aria-expanded="false" aria-controls="mobile-menu">☰</button>
</header>
